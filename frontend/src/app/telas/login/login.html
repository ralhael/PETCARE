<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <p>Acesse sua conta para cuidar do seu pet</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="cpf">CPF</label>
        <input id="cpf" type="text" formControlName="cpf" placeholder="Digite apenas 11 números" maxlength="11">
        <div *ngIf="loginForm.get('cpf')?.errors && loginForm.get('cpf')?.touched" class="error-msg">
          <small *ngIf="loginForm.get('cpf')?.errors?.['required']">O CPF é obrigatório.</small>
          <small *ngIf="loginForm.get('cpf')?.errors?.['pattern']">O CPF deve conter exatamente 11 números.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input id="senha" type="password" formControlName="senha" placeholder="Sua senha">
        <div *ngIf="loginForm.get('senha')?.errors && loginForm.get('senha')?.touched" class="error-msg">
          <small *ngIf="loginForm.get('senha')?.errors?.['required']">A senha é obrigatória.</small>
          <small *ngIf="loginForm.get('senha')?.errors?.['minlength']">A senha deve ter no mínimo 6 caracteres.</small>
        </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn-entrar">Entrar</button>
    </form>
  </div>
</div>
